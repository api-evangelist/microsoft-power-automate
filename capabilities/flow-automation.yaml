naftiko: "1.0.0-alpha1"

info:
  label: "Microsoft Power Automate Flow Automation"
  description: "Workflow capability for managing Power Automate flows, environments, and connectors. Used by automation engineers and platform administrators."
  tags:
    - Microsoft Power Automate
    - Automation
    - Flow Management
    - Low-Code
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      POWER_AUTOMATE_TOKEN: POWER_AUTOMATE_TOKEN

capability:
  consumes:
    - import: management-api
      location: ./shared/management-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: flow-automation-api
      description: "Unified REST API for Power Automate flow automation workflows."
      resources:
        - path: /v1/environments
          name: environments
          description: "Environment management"
          operations:
            - method: GET
              name: list-environments
              description: "List all environments"
              call: "management-api.list-environments"
        - path: /v1/flows
          name: flows
          description: "Flow lifecycle management"
          operations:
            - method: GET
              name: list-flows
              description: "List flows"
              call: "management-api.list-flows"
            - method: POST
              name: create-flow
              description: "Create a flow"
              call: "management-api.create-flow"
            - method: GET
              name: get-flow
              description: "Get flow details"
              call: "management-api.get-flow"
            - method: PATCH
              name: update-flow
              description: "Update a flow"
              call: "management-api.update-flow"
            - method: DELETE
              name: delete-flow
              description: "Delete a flow"
              call: "management-api.delete-flow"
        - path: /v1/connectors
          name: connectors
          description: "Connector management"
          operations:
            - method: GET
              name: list-connectors
              description: "List connectors"
              call: "management-api.list-connectors"

    - type: mcp
      port: 9090
      namespace: flow-automation-mcp
      transport: http
      description: "MCP server for AI-assisted Power Automate management."
      tools:
        - name: list-environments
          description: "List all Power Automate environments"
          hints:
            readOnly: true
            openWorld: true
          call: "management-api.list-environments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-flows
          description: "List flows in an environment"
          hints:
            readOnly: true
            openWorld: true
          call: "management-api.list-flows"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-flow
          description: "Create a new automation flow"
          hints:
            readOnly: false
          call: "management-api.create-flow"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-flow
          description: "Get details of a specific flow"
          hints:
            readOnly: true
          call: "management-api.get-flow"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-flow
          description: "Update a flow's properties"
          hints:
            readOnly: false
          call: "management-api.update-flow"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-flow
          description: "Delete a flow"
          hints:
            destructive: true
          call: "management-api.delete-flow"
          outputParameters:
            - type: object
              mapping: "$."
        - name: turn-on-flow
          description: "Start/activate a flow"
          hints:
            readOnly: false
          call: "management-api.turn-on-flow"
          outputParameters:
            - type: object
              mapping: "$."
        - name: turn-off-flow
          description: "Stop/deactivate a flow"
          hints:
            readOnly: false
          call: "management-api.turn-off-flow"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-connectors
          description: "List available connectors in an environment"
          hints:
            readOnly: true
          call: "management-api.list-connectors"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-connector
          description: "Get details of a specific connector"
          hints:
            readOnly: true
          call: "management-api.get-connector"
          outputParameters:
            - type: object
              mapping: "$."
