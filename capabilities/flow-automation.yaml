naftiko: 1.0.0-alpha2
info:
  label: Microsoft Power Automate Flow Automation
  description: Workflow capability for managing Power Automate flows, environments, and connectors. Used by automation engineers
    and platform administrators.
  tags:
  - Microsoft Power Automate
  - Automation
  - Flow Management
  - Low-Code
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    POWER_AUTOMATE_TOKEN: POWER_AUTOMATE_TOKEN
capability:
  consumes:
  - type: http
    namespace: management-api
    baseUri: https://api.flow.microsoft.com
    description: Power Automate Management API for managing flows, environments, and connectors.
    authentication:
      type: bearer
      token: '{{POWER_AUTOMATE_TOKEN}}'
    resources:
    - name: environments
      path: /providers/Microsoft.ProcessSimple/environments
      description: Environment management operations
      operations:
      - name: list-environments
        method: GET
        description: List all accessible environments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: flows
      path: /providers/Microsoft.ProcessSimple/environments/{environmentName}/flows
      description: Flow management operations
      operations:
      - name: list-flows
        method: GET
        description: List flows in an environment
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
          description: Environment name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-flow
        method: POST
        description: Create a new flow
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
          description: Environment name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.flowProperties}}'
      - name: get-flow
        method: GET
        description: Get flow details
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
        - name: flowName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-flow
        method: PATCH
        description: Update a flow
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
        - name: flowName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-flow
        method: DELETE
        description: Delete a flow
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
        - name: flowName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: turn-on-flow
        method: POST
        description: Start a flow
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
        - name: flowName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: turn-off-flow
        method: POST
        description: Stop a flow
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
        - name: flowName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: connectors
      path: /providers/Microsoft.ProcessSimple/environments/{environmentName}/apis
      description: Connector operations
      operations:
      - name: list-connectors
        method: GET
        description: List all connectors
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-connector
        method: GET
        description: Get connector details
        inputParameters:
        - name: environmentName
          in: path
          type: string
          required: true
        - name: apiName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: flow-automation-api
    description: Unified REST API for Power Automate flow automation workflows.
    resources:
    - path: /v1/environments
      name: environments
      description: Environment management
      operations:
      - method: GET
        name: list-environments
        description: List all environments
        call: management-api.list-environments
    - path: /v1/flows
      name: flows
      description: Flow lifecycle management
      operations:
      - method: GET
        name: list-flows
        description: List flows
        call: management-api.list-flows
      - method: POST
        name: create-flow
        description: Create a flow
        call: management-api.create-flow
      - method: GET
        name: get-flow
        description: Get flow details
        call: management-api.get-flow
      - method: PATCH
        name: update-flow
        description: Update a flow
        call: management-api.update-flow
      - method: DELETE
        name: delete-flow
        description: Delete a flow
        call: management-api.delete-flow
    - path: /v1/connectors
      name: connectors
      description: Connector management
      operations:
      - method: GET
        name: list-connectors
        description: List connectors
        call: management-api.list-connectors
  - type: mcp
    port: 9090
    namespace: flow-automation-mcp
    transport: http
    description: MCP server for AI-assisted Power Automate management.
    tools:
    - name: list-environments
      description: List all Power Automate environments
      hints:
        readOnly: true
        openWorld: true
      call: management-api.list-environments
      outputParameters:
      - type: object
        mapping: $.
    - name: list-flows
      description: List flows in an environment
      hints:
        readOnly: true
        openWorld: true
      call: management-api.list-flows
      outputParameters:
      - type: object
        mapping: $.
    - name: create-flow
      description: Create a new automation flow
      hints:
        readOnly: false
      call: management-api.create-flow
      outputParameters:
      - type: object
        mapping: $.
    - name: get-flow
      description: Get details of a specific flow
      hints:
        readOnly: true
      call: management-api.get-flow
      outputParameters:
      - type: object
        mapping: $.
    - name: update-flow
      description: Update a flow's properties
      hints:
        readOnly: false
      call: management-api.update-flow
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-flow
      description: Delete a flow
      hints:
        destructive: true
      call: management-api.delete-flow
      outputParameters:
      - type: object
        mapping: $.
    - name: turn-on-flow
      description: Start/activate a flow
      hints:
        readOnly: false
      call: management-api.turn-on-flow
      outputParameters:
      - type: object
        mapping: $.
    - name: turn-off-flow
      description: Stop/deactivate a flow
      hints:
        readOnly: false
      call: management-api.turn-off-flow
      outputParameters:
      - type: object
        mapping: $.
    - name: list-connectors
      description: List available connectors in an environment
      hints:
        readOnly: true
      call: management-api.list-connectors
      outputParameters:
      - type: object
        mapping: $.
    - name: get-connector
      description: Get details of a specific connector
      hints:
        readOnly: true
      call: management-api.get-connector
      outputParameters:
      - type: object
        mapping: $.
