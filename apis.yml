aid: microsoft-power-automate
name: Microsoft Power Automate
description: >-
  Microsoft Power Automate is a cloud-based service that helps you create
  automated workflows between your favorite apps and services to synchronize
  files, get notifications, collect data, and automate business processes. It
  supports automated, instant, and scheduled cloud flows, as well as desktop
  flows for robotic process automation.
